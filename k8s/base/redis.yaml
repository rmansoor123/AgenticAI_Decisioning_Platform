apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: fraud-detection
  labels:
    app: fraud-detection
    component: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: fraud-detection
      component: redis
  template:
    metadata:
      labels:
        app: fraud-detection
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redisdata
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: redisdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: fraud-detection
spec:
  selector:
    app: fraud-detection
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None
