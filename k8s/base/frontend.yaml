apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fraud-detection
  labels:
    app: fraud-detection
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-detection
      component: frontend
  template:
    metadata:
      labels:
        app: fraud-detection
        component: frontend
    spec:
      containers:
        - name: frontend
          image: fraud-detection-frontend:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: fraud-detection
spec:
  selector:
    app: fraud-detection
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
