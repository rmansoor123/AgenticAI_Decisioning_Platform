apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fraud-detection

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  # Application
  - backend.yaml
  - frontend.yaml
  # Data layer
  - postgres.yaml
  - redis.yaml
  - neo4j.yaml
  - qdrant.yaml
  # Observability
  - langfuse.yaml
  - phoenix.yaml
  # Memory & Analytics
  - zep.yaml
  - pinot.yaml
  # LLM
  - ollama.yaml
  # Networking
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: fraud-detection-platform
  app.kubernetes.io/managed-by: kustomize
