apiVersion: v1
kind: Secret
metadata:
  name: fraud-detection-secrets
  namespace: fraud-detection
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_USER: fraud_user
  POSTGRES_PASSWORD: fraud_pass  # CHANGE IN PRODUCTION

  # Neo4j
  NEO4J_AUTH: neo4j/fraud_detection  # CHANGE IN PRODUCTION

  # Langfuse
  LANGFUSE_SECRET_KEY: sk-lf-change-me
  LANGFUSE_PUBLIC_KEY: pk-lf-change-me
  NEXTAUTH_SECRET: change-me-in-production

  # LLM API Keys (leave empty if using Ollama)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""

  # Pinecone
  PINECONE_API_KEY: ""
